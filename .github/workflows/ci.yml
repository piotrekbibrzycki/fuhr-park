name: CI

on:
  push:
  pull_request:

jobs:
  test-build-docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run tests
        run: ./mvnw test

      - name: Build jar
        run: ./mvnw -DskipTests package

      - name: Docker build
        run: docker build -t fuhrpark:ci .
