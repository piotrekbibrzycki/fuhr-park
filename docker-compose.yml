services:
  db:
    image: postgres:15
    container_name: fuhrpark-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=fuhrpark
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d fuhrpark"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    container_name: fuhrpark-app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/fuhrpark
      - SPRING_DATASOURCE_USERNAME=user
      - SPRING_DATASOURCE_PASSWORD=pass
      - TRACKING_TCP_ENABLED=true
      - TRACKING_TCP_PORT=9090

volumes:
  postgres_data: