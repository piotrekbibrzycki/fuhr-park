<svg xmlns="http://www.w3.org/2000/svg" width="680" height="360" viewBox="0 0 680 360">
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a1a;
    --fg2: #6b6b6b;
    --fg3: #999999;
    --line: #cccccc;
    --box-bg: #fafafa;
    --box-stroke: #d4d4d4;
  }
  text { font-family: "SF Mono", "Cascadia Code", "Fira Code", Consolas, monospace; }
</style>
<defs>
  <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 2L8 5L2 8" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect width="680" height="360" fill="var(--bg)"/>


<rect x="240" y="24" width="200" height="48" rx="3" fill="var(--box-bg)" stroke="var(--box-stroke)" stroke-width="0.7"/>
<text x="340" y="44" text-anchor="middle" dominant-baseline="central" font-size="11" fill="var(--fg)">client</text>

<line x1="340" y1="72" x2="340" y2="102" stroke="var(--line)" stroke-width="0.8" marker-end="url(#a)"/>

<rect x="50" y="112" width="580" height="138" rx="4" fill="none" stroke="var(--line)" stroke-width="0.7" stroke-dasharray="4 3"/>
<text x="66" y="126" font-size="9" fill="var(--fg3)" letter-spacing="0.5">spring boot modules</text>

<rect x="85" y="136" width="120" height="48" rx="3" fill="var(--box-bg)" stroke="var(--box-stroke)" stroke-width="0.7"/>
<text x="145" y="155" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="500" fill="var(--fg)">driver module</text>

<rect x="215" y="136" width="120" height="48" rx="3" fill="var(--box-bg)" stroke="var(--box-stroke)" stroke-width="0.7"/>
<text x="275" y="155" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="500" fill="var(--fg)">truck module</text>

<rect x="345" y="136" width="120" height="48" rx="3" fill="var(--box-bg)" stroke="var(--box-stroke)" stroke-width="0.7"/>
<text x="405" y="155" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="500" fill="var(--fg)">trip module</text>

<rect x="475" y="136" width="120" height="48" rx="3" fill="var(--box-bg)" stroke="var(--box-stroke)" stroke-width="0.7"/>
<text x="535" y="155" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="500" fill="var(--fg)">stats module</text>

<text x="340" y="215" text-anchor="middle" font-size="9" fill="var(--fg2)">domain rules + validation + service layer</text>

<line x1="340" y1="250" x2="340" y2="280" stroke="var(--line)" stroke-width="0.8" marker-end="url(#a)"/>

<rect x="240" y="290" width="200" height="48" rx="3" fill="var(--box-bg)" stroke="var(--box-stroke)" stroke-width="0.7"/>
<text x="340" y="309" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="500" fill="var(--fg)">postgresql</text>

</svg>
