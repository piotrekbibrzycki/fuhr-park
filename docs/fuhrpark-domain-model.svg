<svg xmlns="http://www.w3.org/2000/svg" width="680" height="360" viewBox="0 0 680 360">
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a1a;
    --fg2: #6b6b6b;
    --fg3: #999999;
    --line: #cccccc;
    --box-bg: #fafafa;
    --box-stroke: #d4d4d4;
  }
  text { font-family: "SF Mono", "Cascadia Code", "Fira Code", Consolas, monospace; }
</style>
<defs>
  <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 2L8 5L2 8" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect width="680" height="360" fill="var(--bg)"/>

<rect x="50" y="66" width="580" height="230" rx="4" fill="none" stroke="var(--line)" stroke-width="0.7" stroke-dasharray="4 3"/>
<text x="66" y="82" font-size="9" fill="var(--fg3)" letter-spacing="0.5">domain model</text>

<rect x="90" y="120" width="130" height="48" rx="3" fill="var(--box-bg)" stroke="var(--box-stroke)" stroke-width="0.7"/>
<text x="155" y="139" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="500" fill="var(--fg)">driver</text>
<text x="155" y="154" text-anchor="middle" dominant-baseline="central" font-size="9" fill="var(--fg3)">assigned to trips</text>

<rect x="275" y="120" width="130" height="48" rx="3" fill="var(--box-bg)" stroke="var(--box-stroke)" stroke-width="0.7"/>
<text x="340" y="139" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="500" fill="var(--fg)">trip</text>

<rect x="460" y="120" width="130" height="48" rx="3" fill="var(--box-bg)" stroke="var(--box-stroke)" stroke-width="0.7"/>
<text x="525" y="139" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="500" fill="var(--fg)">truck</text>
<text x="525" y="154" text-anchor="middle" dominant-baseline="central" font-size="9" fill="var(--fg3)">used in trips</text>

<line x1="220" y1="144" x2="275" y2="144" stroke="var(--line)" stroke-width="0.8" marker-end="url(#a)"/>
<text x="247" y="134" text-anchor="middle" font-size="8.5" fill="var(--fg3)">1..many</text>

<line x1="460" y1="144" x2="405" y2="144" stroke="var(--line)" stroke-width="0.8" marker-end="url(#a)"/>
<text x="432" y="134" text-anchor="middle" font-size="8.5" fill="var(--fg3)">1..many</text>

<rect x="435" y="214" width="180" height="48" rx="3" fill="var(--box-bg)" stroke="var(--box-stroke)" stroke-width="0.7"/>
<text x="525" y="233" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="500" fill="var(--fg)">truck location</text>
<text x="525" y="248" text-anchor="middle" dominant-baseline="central" font-size="9" fill="var(--fg3)">latest GPS state</text>

<line x1="525" y1="168" x2="525" y2="214" stroke="var(--line)" stroke-width="0.8" marker-end="url(#a)"/>
<text x="556" y="194" font-size="8.5" fill="var(--fg3)">1..1 latest</text>

<text x="340" y="282" text-anchor="middle" font-size="9" fill="var(--fg2)">one active driver and one active truck are assigned to each trip</text>

</svg>
