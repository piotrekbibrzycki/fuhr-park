<svg xmlns="http://www.w3.org/2000/svg" width="680" height="380" viewBox="0 0 680 380">
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a1a;
    --fg2: #6b6b6b;
    --fg3: #999999;
    --line: #cccccc;
    --box-bg: #fafafa;
    --box-stroke: #d4d4d4;
  }
  text { font-family: "SF Mono", "Cascadia Code", "Fira Code", Consolas, monospace; }
</style>
<defs>
  <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 2L8 5L2 8" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect width="680" height="380" fill="var(--bg)"/>

<rect x="240" y="26" width="200" height="46" rx="3" fill="var(--box-bg)" stroke="var(--box-stroke)" stroke-width="0.7"/>
<text x="340" y="45" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="500" fill="var(--fg)">HTTP client</text>
<text x="340" y="60" text-anchor="middle" dominant-baseline="central" font-size="9" fill="var(--fg3)">REST requests :8080</text>

<line x1="340" y1="72" x2="340" y2="100" stroke="var(--line)" stroke-width="0.8" marker-end="url(#a)"/>

<rect x="50" y="110" width="580" height="130" rx="4" fill="none" stroke="var(--line)" stroke-width="0.7" stroke-dasharray="4 3"/>
<text x="66" y="126" font-size="9" fill="var(--fg3)" letter-spacing="0.5">REST controllers</text>

<rect x="82" y="148" width="92" height="42" rx="3" fill="var(--box-bg)" stroke="var(--box-stroke)" stroke-width="0.7"/>
<text x="128" y="171" text-anchor="middle" dominant-baseline="central" font-size="10" fill="var(--fg)">trucks</text>

<rect x="190" y="148" width="92" height="42" rx="3" fill="var(--box-bg)" stroke="var(--box-stroke)" stroke-width="0.7"/>
<text x="236" y="171" text-anchor="middle" dominant-baseline="central" font-size="10" fill="var(--fg)">drivers</text>

<rect x="298" y="148" width="92" height="42" rx="3" fill="var(--box-bg)" stroke="var(--box-stroke)" stroke-width="0.7"/>
<text x="344" y="171" text-anchor="middle" dominant-baseline="central" font-size="10" fill="var(--fg)">trips</text>

<rect x="406" y="148" width="92" height="42" rx="3" fill="var(--box-bg)" stroke="var(--box-stroke)" stroke-width="0.7"/>
<text x="452" y="171" text-anchor="middle" dominant-baseline="central" font-size="10" fill="var(--fg)">stats</text>

<rect x="514" y="148" width="92" height="42" rx="3" fill="var(--box-bg)" stroke="var(--box-stroke)" stroke-width="0.7"/>
<text x="560" y="171" text-anchor="middle" dominant-baseline="central" font-size="10" fill="var(--fg)">locations</text>

<line x1="340" y1="240" x2="340" y2="268" stroke="var(--line)" stroke-width="0.8" marker-end="url(#a)"/>

<rect x="220" y="268" width="240" height="38" rx="3" fill="var(--box-bg)" stroke="var(--box-stroke)" stroke-width="0.7"/>
<text x="340" y="288" text-anchor="middle" dominant-baseline="central" font-size="10.5" fill="var(--fg)">service layer + JPA repositories</text>

<line x1="340" y1="306" x2="340" y2="330" stroke="var(--line)" stroke-width="0.8" marker-end="url(#a)"/>

<rect x="240" y="334" width="200" height="28" rx="3" fill="var(--box-bg)" stroke="var(--box-stroke)" stroke-width="0.7"/>
<text x="340" y="350" text-anchor="middle" dominant-baseline="central" font-size="10.5" fill="var(--fg)">PostgreSQL</text>

