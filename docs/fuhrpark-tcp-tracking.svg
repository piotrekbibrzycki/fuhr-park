<svg xmlns="http://www.w3.org/2000/svg" width="680" height="300" viewBox="0 0 680 300">
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a1a;
    --fg2: #6b6b6b;
    --fg3: #999999;
    --line: #cccccc;
    --box-bg: #fafafa;
    --box-stroke: #d4d4d4;
  }
  text { font-family: "SF Mono", "Cascadia Code", "Fira Code", Consolas, monospace; }
</style>
<defs>
  <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 2L8 5L2 8" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect width="680" height="300" fill="var(--bg)"/>

<rect x="50" y="54" width="580" height="160" rx="4" fill="none" stroke="var(--line)" stroke-width="0.7" stroke-dasharray="4 3"/>
<text x="66" y="70" font-size="9" fill="var(--fg3)" letter-spacing="0.5">tcp truck tracking</text>

<rect x="90" y="118" width="140" height="48" rx="3" fill="var(--box-bg)" stroke="var(--box-stroke)" stroke-width="0.7"/>
<text x="160" y="137" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="500" fill="var(--fg)">truck tracker</text>
<text x="160" y="152" text-anchor="middle" dominant-baseline="central" font-size="9" fill="var(--fg3)">newline JSON</text>

<text x="250" y="106" text-anchor="middle" font-size="8.5" fill="var(--fg3)">TCP :9090</text>
<line x1="230" y1="142" x2="270" y2="142" stroke="var(--line)" stroke-width="0.8" marker-end="url(#a)"/>

<rect x="270" y="118" width="140" height="48" rx="3" fill="var(--box-bg)" stroke="var(--box-stroke)" stroke-width="0.7"/>
<text x="340" y="137" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="500" fill="var(--fg)">TCP receiver</text>
<text x="340" y="152" text-anchor="middle" dominant-baseline="central" font-size="9" fill="var(--fg3)">parse message</text>

<text x="430" y="106" text-anchor="middle" font-size="8.5" fill="var(--fg3)">DTO</text>
<line x1="410" y1="142" x2="450" y2="142" stroke="var(--line)" stroke-width="0.8" marker-end="url(#a)"/>

<rect x="450" y="118" width="140" height="48" rx="3" fill="var(--box-bg)" stroke="var(--box-stroke)" stroke-width="0.7"/>
<text x="520" y="137" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="500" fill="var(--fg)">location service</text>
<text x="520" y="152" text-anchor="middle" dominant-baseline="central" font-size="9" fill="var(--fg3)">validate + update</text>

<text x="340" y="244" text-anchor="middle" font-size="9" fill="var(--fg2)">invalid tracking messages are rejected before updating latest location</text>

</svg>
